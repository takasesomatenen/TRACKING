<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Inter-Hand String Visualizer</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; cursor: pointer; }
    canvas { transform: scaleX(-1); max-width: 100%; max-height: 100%; }
    video { display: none; }
  </style>
</head>
<body>
  <video id="input_video"></video>
  <canvas id="output_canvas"></canvas>

  <script type="module">
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let lastHandResults = null;
    let lastFaceResults = null;

    // --- Audio Engine (前回のまま保持) ---
    let audioCtx = null;
    let mainGain = null;
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      mainGain = audioCtx.createGain();
      mainGain.connect(audioCtx.destination);
    }
    window.addEventListener('click', initAudio);

    function playMallet(freq = 440) {
      if(!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
      osc.connect(gain);
      gain.connect(mainGain);
      osc.start();
      osc.stop(audioCtx.currentTime + 1.0);
    }

    function resizeCanvas() {
      canvasElement.width = window.innerWidth;
      canvasElement.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function draw() {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      const img = lastHandResults?.image || lastFaceResults?.image;
      if (img) {
        canvasCtx.filter = 'grayscale(100%) brightness(0.4)';
        canvasCtx.drawImage(img, 0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.filter = 'none';
      }

      // --- 左右の指を繋ぐロジック ---
      if (lastHandResults && lastHandResults.multiHandLandmarks && lastHandResults.multiHandLandmarks.length >= 2) {
        let leftHand = null;
        let rightHand = null;

        // 左右の手を特定
        lastHandResults.multiHandedness.forEach((handedness, index) => {
          if (handedness.label === 'Left') leftHand = lastHandResults.multiHandLandmarks[index];
          if (handedness.label === 'Right') rightHand = lastHandResults.multiHandLandmarks[index];
        });

        if (leftHand && rightHand) {
          canvasCtx.lineWidth = 1;
          canvasCtx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
          
          // 全ての関節（0〜20）をループして、左右の同じ点を線で結ぶ
          for (let i = 0; i < 21; i++) {
            canvasCtx.beginPath();
            canvasCtx.moveTo(leftHand[i].x * canvasElement.width, leftHand[i].y * canvasElement.height);
            canvasCtx.lineTo(rightHand[i].x * canvasElement.width, rightHand[i].y * canvasElement.height);
            canvasCtx.stroke();
          }
        }
      }

      // 通常の手の描画
      if (lastHandResults && lastHandResults.multiHandLandmarks) {
        for (const landmarks of lastHandResults.multiHandLandmarks) {
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FFCC', lineWidth: 2});
          drawLandmarks(canvasCtx, landmarks, {color: '#FF00CC', lineWidth: 1, radius: 2});
        }
      }

      // 顔の描画
      if (lastFaceResults && lastFaceResults.multiFaceLandmarks) {
        for (const landmarks of lastFaceResults.multiFaceLandmarks) {
          drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: '#FFFFFF20', lineWidth: 1});
        }
      }

      canvasCtx.restore();
      requestAnimationFrame(draw);
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(results => { lastHandResults = results; });

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces: 1, minDetectionConfidence: 0.7 });
    faceMesh.onResults(results => { lastFaceResults = results; });

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
        await faceMesh.send({image: videoElement});
      },
      width: 1280, height: 720
    });
    camera.start();
    draw();
  </script>
</body>
</html>
