<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Face Noise Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; cursor: pointer; }
    canvas { transform: scaleX(-1); max-width: 100%; max-height: 100%; }
    video { display: none; }
    #msg { position: absolute; color: white; font-family: sans-serif; pointer-events: none; opacity: 0.5; }
  </style>
</head>
<body>
  <div id="msg">Click to Start Audio</div>
  <video id="input_video"></video>
  <canvas id="output_canvas"></canvas>

  <script type="module">
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let lastHandResults = null;
    let lastFaceResults = null;
    let prevFaceLandmarks = null;
    
    // --- Audio Setup ---
    let audioCtx = null;
    let gainNode = null;
    const baseVolume = 0.02; // 動きがない時の薄いノイズ量

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      // ホワイトノイズの生成
      const bufferSize = 2 * audioCtx.sampleRate;
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }

      const whiteNoise = audioCtx.createBufferSource();
      whiteNoise.buffer = noiseBuffer;
      whiteNoise.loop = true;

      gainNode = audioCtx.createGain();
      gainNode.gain.value = baseVolume;

      whiteNoise.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      whiteNoise.start();
      document.getElementById('msg').style.display = 'none';
    }

    window.addEventListener('click', initAudio);

    function resizeCanvas() {
      canvasElement.width = window.innerWidth;
      canvasElement.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function draw() {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      const img = lastHandResults?.image || lastFaceResults?.image;
      if (img) {
        canvasCtx.filter = 'grayscale(100%)';
        canvasCtx.drawImage(img, 0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.filter = 'none';
      }

      // 手の描画
      if (lastHandResults && lastHandResults.multiHandLandmarks) {
        for (const landmarks of lastHandResults.multiHandLandmarks) {
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 5});
          drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1});
        }
      }

      // 顔の描画と動きの計算
      if (lastFaceResults && lastFaceResults.multiFaceLandmarks) {
        const landmarks = lastFaceResults.multiFaceLandmarks[0];
        
        if (prevFaceLandmarks && gainNode) {
          // 鼻の頭（index 1）の移動距離を計算
          const dx = landmarks[1].x - prevFaceLandmarks[1].x;
          const dy = landmarks[1].y - prevFaceLandmarks[1].y;
          const distance = Math.sqrt(dx*dx + dy*dy);
          
          // 動きに応じて音量を変化（感度は 5.0 の部分で調整）
          const targetGain = baseVolume + (distance * 5.0);
          gainNode.gain.setTargetAtTime(Math.min(targetGain, 0.3), audioCtx.currentTime, 0.1);
        }
        prevFaceLandmarks = landmarks;

        for (const faceLandmarks of lastFaceResults.multiFaceLandmarks) {
          drawConnectors(canvasCtx, faceLandmarks, FACEMESH_TESSELATION, {color: '#C0C0C070', lineWidth: 1});
          drawConnectors(canvasCtx, faceLandmarks, FACEMESH_RIGHT_EYE, {color: '#FF3030', lineWidth: 2});
          drawConnectors(canvasCtx, faceLandmarks, FACEMESH_LEFT_EYE, {color: '#30FF30', lineWidth: 2});
          drawConnectors(canvasCtx, faceLandmarks, FACEMESH_LIPS, {color: '#E0E0E0', lineWidth: 2});
        }
      }
      canvasCtx.restore();
      requestAnimationFrame(draw);
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(results => { lastHandResults = results; });

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(results => { lastFaceResults = results; });

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
        await faceMesh.send({image: videoElement});
      },
      width: 1280, height: 720
    });
    camera.start();
    draw();
  </script>
</body>
</html>
