<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Minimalist Hand String Visualizer</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; cursor: pointer; }
    canvas { transform: scaleX(-1); max-width: 100%; max-height: 100%; }
    video { display: none; }
  </style>
</head>
<body>
  <video id="input_video"></video>
  <canvas id="output_canvas"></canvas>

  <script type="module">
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let lastHandResults = null;
    let lastFaceResults = null;

    // --- Audio Engine (保持) ---
    let audioCtx = null;
    let mainGain = null;
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      mainGain = audioCtx.createGain();
      mainGain.connect(audioCtx.destination);
    }
    window.addEventListener('click', initAudio);

    function resizeCanvas() {
      canvasElement.width = window.innerWidth;
      canvasElement.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function draw() {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      const img = lastHandResults?.image || lastFaceResults?.image;
      if (img) {
        // 背景を暗めの白黒に設定
        canvasCtx.filter = 'grayscale(100%) brightness(0.3)';
        canvasCtx.drawImage(img, 0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.filter = 'none';
      }

      // --- 左右の指を繋ぐ線 (String) ---
      if (lastHandResults && lastHandResults.multiHandLandmarks && lastHandResults.multiHandLandmarks.length >= 2) {
        let leftHand = null;
        let rightHand = null;

        lastHandResults.multiHandedness.forEach((handedness, index) => {
          if (handedness.label === 'Left') leftHand = lastHandResults.multiHandLandmarks[index];
          if (handedness.label === 'Right') rightHand = lastHandResults.multiHandLandmarks[index];
        });

        if (leftHand && rightHand) {
          canvasCtx.lineWidth = 0.5; // 左右を繋ぐ線はあえて極細に
          canvasCtx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
          for (let i = 0; i < 21; i++) {
            canvasCtx.beginPath();
            canvasCtx.moveTo(leftHand[i].x * canvasElement.width, leftHand[i].y * canvasElement.height);
            canvasCtx.lineTo(rightHand[i].x * canvasElement.width, rightHand[i].y * canvasElement.height);
            canvasCtx.stroke();
          }
        }
      }

      // --- 手のトラッキング（白に統一） ---
      if (lastHandResults && lastHandResults.multiHandLandmarks) {
        for (const landmarks of lastHandResults.multiHandLandmarks) {
          // 骨格の線
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#FFFFFF', lineWidth: 2});
          // 関節の点
          drawLandmarks(canvasCtx, landmarks, {color: '#FFFFFF', lineWidth: 1, radius: 2});
        }
      }

      // --- 顔のトラッキング（薄い白に設定） ---
      if (lastFaceResults && lastFaceResults.multiFaceLandmarks) {
        for (const landmarks of lastFaceResults.multiFaceLandmarks) {
          drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: 'rgba(255, 255, 255, 0.15)', lineWidth: 1});
          drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, {color: 'rgba(255, 255, 255, 0.5)', lineWidth: 1});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, {color: 'rgba(255, 255, 255, 0.5)', lineWidth: 1});
        }
      }

      canvasCtx.restore();
      requestAnimationFrame(draw);
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(results => { lastHandResults = results; });

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces: 1, minDetectionConfidence: 0.7 });
    faceMesh.onResults(results => { lastFaceResults = results; });

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
        await faceMesh.send({image: videoElement});
      },
      width: 1280, height: 720
    });
    camera.start();
    draw();
  </script>
</body>
</html>
